name: Update Filters

on:
  push:
    paths-ignore:
      - 'README.md'
      - '.github/**'
      - 'LICENSE'
      - 'rules/**'
    branches: [ main ]
  schedule:
    - cron: "13 8 * * *"
  workflow_dispatch:

jobs:
  Update_Filters:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      - uses: actions/checkout@main

      - name: Check and Save Runner Server Info
        run: |
          mkdir -p txt
          echo "=== Run at $(date -u '+%Y-%m-%d %H:%M:%S UTC') ===" >> txt/server_ip_history.txt
          curl -s ipinfo.io >> txt/server_ip_history.txt
          echo -e "\n" >> txt/server_ip_history.txt

      - name: Build Rules
        run: bash ./script/build-combined-rules.sh
      
      # --- 替换为原生 Git 命令处理并发冲突 ---
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "🚀 CI Updated"
          
          # 推送前先拉取远程最新代码并合并，遇到冲突保留远程版本 (-X theirs)
          git pull --rebase -X theirs origin main
          
          git push origin main
      # ----------------------------------------

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1
