name: Update Filters
on:
  push:
    paths-ignore:
      - 'README.md'
      - '.github/**'
      - 'LICENSE'
      - 'rules/**'
    branches: [ main ]
  schedule:
    - cron: "13 8 * * *"
  workflow_dispatch:

jobs:
  Update_Filters:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      # 1. 获取代码，使用 @main 拉取最新 checkout 逻辑
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 核心修复步骤：强制本地分支与远程 main 对齐，消除 "Diverged" 状态
      - name: Reset local branch to remote
        run: |
          git fetch origin main
          git reset --hard origin/main

      # 3. 运行构建脚本
      - name: Built Rules
        run: |
          bash ./script/build-combined-rules.sh
      
      # 4. 提交并强制推送，使用 @master 获取最新提交逻辑
      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@master
        with:
          commit_message: 🚀 CI Updated
          # 使用 --force 强制覆盖远程冲突
          push_options: '--force'
          # 如果没有文件变化，不报错
          skip_dirty_check: false

      # 5. 清理记录，使用 @main 获取最新清理逻辑
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1
