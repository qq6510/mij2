name: Update Filters

on:
  push:
    paths-ignore:
      - 'README.md'
      - '.github/**'
      - 'LICENSE'
      - 'rules/**'
    branches: [ main ]
  schedule:
    - cron: "13 8 * * *"
  workflow_dispatch:

jobs:
  Update_Filters:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      # 1. 获取代码：使用稳定的 v4 版本，默认浅克隆以加快拉取速度
      - uses: actions/checkout@main

      # --- 仅增加这一段：创建 txt 文件夹并将服务器 IP 追加到 txt 文件 ---
      - name: Check and Save Runner Server Info
        run: |
          mkdir -p txt
          echo "=== Run at $(date -u '+%Y-%m-%d %H:%M:%S UTC') ===" >> txt/server_ip_history.txt
          curl -s ipinfo.io >> txt/server_ip_history.txt
          echo -e "\n" >> txt/server_ip_history.txt
      # ---------------------------------------------------

      # 2. 运行构建脚本：直接运行即可，无需毫无意义的 git reset
      - name: Build Rules
        run: bash ./script/build-combined-rules.sh
      
      # 3. 提交并推送：使用稳定的 v5 版本
      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@master
        with:
          commit_message: 🚀 CI Updated
          # 去掉了危险的 --force 强制覆盖，利用插件自身的安全推送机制

      # 4. 清理记录：使用稳定的 v3 版本
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1
